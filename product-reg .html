<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product Page</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f5f5;
    }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: flex;
      gap: 30px;
    }

    .product-image img {
      width: 400px;
      border-radius: 10px;
    }

    .product-details {
      flex: 1;
    }

    .product-title {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .price {
      font-size: 24px;
      color: #007bff;
      margin-bottom: 15px;
    }

    .description {
      color: #555;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .quantity {
      margin-bottom: 20px;
    }

    .quantity input {
      width: 60px;
      padding: 5px;
      text-align: center;
    }

    .btn {
      padding: 12px 20px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      margin-right: 10px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0056b3;
    }

    .btn-secondary {
      background: #28a745;
    }

    .btn-secondary:hover {
      background: #1e7e34;
    }

    .reviews {
      margin-top: 40px;
    }

    .review {
      background: #fafafa;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 10px;
    }

    .review strong {
      color: #333;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        text-align: center;
      }

      .product-image img {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<div class="container">
  
  <!-- Product Image -->
  <div class="product-image">
    <img src="https://via.placeholder.com/400" alt="Product">
  </div>

  <!-- Product Details -->
  <div class="product-details">
    <h1 class="product-title">Luxury Blanket</h1>
    <p class="price">25,000 RWF</p>
    <p class="description">
      High-quality soft blanket perfect for your bedroom. Comfortable, stylish, and made for Rwanda weather.
    </p>

    <div class="quantity">
      <label>Quantity:</label>
      <input type="number" value="1" min="1">
    </div>

    <button class="btn">Add to Cart</button>
    <button class="btn btn-secondary">Buy Now</button>
  </div>

</div>

<!-- Reviews Section -->
<div class="container reviews">
  <h2>Customer Reviews</h2>

  <div class="review">
    <strong>John:</strong>
    <p>Very comfortable and good quality!</p>
  </div>

  <div class="review">
    <strong>Alice:</strong>
    <p>I love this blanket, worth the price.</p>
  </div>

</div>

</body>
</html>
